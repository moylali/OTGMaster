org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8
android.useAndroidX=true
android.nonTransitiveRClass=true
kotlin.code.style=official
# Prevent AGP from embedding the build's git revision in META-INF/version-control-info.textproto.
# Without this, any commit after the release tag causes byte differences vs the pre-built APK.
android.experimental.vcsInfo.include=false
